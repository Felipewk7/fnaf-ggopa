<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Nightfall</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <!-- Persistent HUD (Always on top) -->
        <div id="hud">
            <div class="hud-top-right">
                <div id="time">12:00 AM</div>
                <div id="nightdisplay">Noite 1</div>
            </div>
            <div class="hud-bottom-left">
                <div id="energy-label">ENERGIA: <span id="energy-val">100</span>%</div>
                <div id="usage-meter">USO: <div id="usage-bars"></div>
                </div>
            </div>
        </div>

        <!-- Main Menu -->
        <div id="main-menu" class="screen active">
            <h1 class="glitch" data-text="PROJECT NIGHTFALL">PROJECT NIGHTFALL</h1>
            <div id="menu-options">
                <button id="btn-new-game">NOVA ESCURIDÃO (Noite 1)</button>
                <button id="btn-continue" disabled>CONTINUAR (Noite <span id="save-night">1</span>)</button>
            </div>
            <div class="warning">Cuidado: Contém luzes piscantes e sustos.</div>
        </div>

        <!-- Office View -->
        <div id="office" class="screen">
            <div id="office-panner">
                <div id="room">
                    <!-- Left Door Area -->
                    <div class="door-area left">
                        <div class="door-frame">
                            <div id="door-left" class="door open"></div>
                        </div>
                        <div class="buttons-panel">
                            <div class="btn-set">
                                <div class="btn-label">PORTA</div>
                                <button id="btn-door-left" class="btn-door"></button>
                            </div>
                            <div class="btn-set">
                                <div class="btn-label">LUZ</div>
                                <button id="btn-light-left" class="btn-light"></button>
                            </div>
                        </div>
                        <div id="hallway-left" class="hallway"></div>
                    </div>

                    <!-- Center Area -->
                    <div class="desk">
                        <div id="office-poster" class="office-element poster-clean">
                            <div class="poster-text">LET'S<br>PARTY!</div>
                        </div>
                        <div id="office-fan" class="office-element fan-clean">
                            <div class="fan-blades"></div>
                            <div class="fan-center"></div>
                        </div>
                        <div class="office-element desk-labels">
                            <div class="label-item">MONITOR</div>
                            <div class="label-item">TELEFONE</div>
                            <div class="label-item">NOTAS</div>
                        </div>
                    </div>

                    <!-- Right Door Area -->
                    <div class="door-area right">
                        <div id="hallway-right" class="hallway"></div>
                        <div class="door-frame">
                            <div id="door-right" class="door open"></div>
                        </div>
                        <div class="buttons-panel">
                            <div class="btn-set">
                                <div class="btn-label">PORTA</div>
                                <button id="btn-door-right" class="btn-door"></button>
                            </div>
                            <div class="btn-set">
                                <div class="btn-label">LUZ</div>
                                <button id="btn-light-right" class="btn-light"></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- Camera System -->
        <div id="camera-system" class="screen">
            <div class="crt-overlay"></div>
            <div class="cam-feed">
                <div id="static-overlay" class="static"></div>
                <div id="cam-name">CAM 01 - PALCO PRINCIPAL</div>
                <div id="cam-view">
                    <div id="animatronics-view"></div>
                </div>
            </div>

            <div id="map-container">
                <div id="map">
                    <button class="cam-btn active" data-cam="1" style="top: 30px; left: 155px;">1A</button>
                    <button class="cam-btn" data-cam="8" style="top: 130px; left: 155px;">8</button>
                    <button class="cam-btn" data-cam="6" style="top: 95px; left: 25px;">6</button>
                    <button class="cam-btn" data-cam="3" style="top: 185px; left: 25px;">3</button>
                    <button class="cam-btn" data-cam="2" style="top: 95px; right: 25px;">2</button>
                    <button class="cam-btn" data-cam="7" style="top: 185px; right: 25px;">7</button>
                    <button class="cam-btn" data-cam="4a" style="bottom: 85px; left: 90px;">4A</button>
                    <button class="cam-btn" data-cam="4b" style="bottom: 35px; left: 90px;">4B</button>
                    <button class="cam-btn" data-cam="5a" style="bottom: 85px; right: 90px;">5A</button>
                    <button class="cam-btn" data-cam="5b" style="bottom: 35px; right: 90px;">5B</button>
                </div>
                <div class="map-label">MAPA DAS CÂMERAS</div>
            </div>

        </div>

        <!-- Unified Monitor Hover Trigger -->
        <div id="monitor-toggle" class="monitor-trigger">
            <div class="trigger-bar"></div>
        </div>

        <!-- Transitions & Endings -->
        <div id="jumpscare" class="screen">
            <div id="jumpscare-img"></div>
        </div>

        <div id="game-over" class="screen">
            <div class="static opacity-medium"></div>
            <div class="end-content">
                <h1>VOCÊ NÃO SOBREVIVEU</h1>
                <button id="btn-retry">TENTAR NOVAMENTE</button>
            </div>
        </div>

        <div id="win-screen" class="screen">
            <h1>06:00 AM</h1>
            <p>SOBREVIVEU À NOITE!</p>
            <button id="btn-next-night">AVANÇAR</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
